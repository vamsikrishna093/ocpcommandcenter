# prometheus/alert-rules.yml
# ─────────────────────────────────────────────────────────────
# AIOps Alert Rules
#
# These rules are evaluated by Prometheus every 15 seconds.
# When a rule fires, Prometheus sends the alert to Alertmanager
# which then POSTs it to the AIOps Bridge → xyOps ticket.
#
# Labels:
#   severity: info | warning | critical
#   team:     platform (owner team)
#
# Annotations used by the bridge:
#   summary:       short 1-line description (becomes ticket title)
#   description:   full detail (becomes ticket body)
#   dashboard_url: deep-link into Grafana (put in ticket)
#   runbook_url:   link to xyOps or a runbook doc
# ─────────────────────────────────────────────────────────────

groups:

  # ────────────────────────────────────────────────────────────
  # Error Rate Alerts
  # Based on http_errors_total / http_requests_total counters
  # emitted by both services via the OTel collector.
  # ────────────────────────────────────────────────────────────
  - name: error_rate
    interval: 15s
    rules:

      # Warning: >5% of requests are errors for ≥1 minute
      - alert: HighErrorRate
        expr: |
          (
            sum by (service_name) (rate(http_errors_total[2m]))
            /
            sum by (service_name) (rate(http_requests_total[2m]))
          ) > 0.05
        for: 15s
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High error rate on {{ $labels.service_name }}"
          description: >-
            {{ $labels.service_name }} error rate is
            {{ $value | humanizePercentage }} over the last 2 minutes.
            Expected < 5%.
          dashboard_url: "http://grafana:3000/d/obs-overview"
          runbook_url: "http://xyops:5522"

      # Critical: >20% of requests are errors for ≥30 seconds
      - alert: CriticalErrorRate
        expr: |
          (
            sum by (service_name) (rate(http_errors_total[2m]))
            /
            sum by (service_name) (rate(http_requests_total[2m]))
          ) > 0.20
        for: 10s
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "CRITICAL error rate on {{ $labels.service_name }}"
          description: >-
            {{ $labels.service_name }} error rate is
            {{ $value | humanizePercentage }} — immediate action required.
            SLO breach imminent.
          dashboard_url: "http://grafana:3000/d/obs-overview"
          runbook_url: "http://xyops:5522"

  # ────────────────────────────────────────────────────────────
  # Latency Alerts
  # Based on http_request_duration_seconds histogram.
  # ────────────────────────────────────────────────────────────
  - name: latency
    interval: 15s
    rules:

      # Warning: p99 latency > 3 seconds for ≥2 minutes
      - alert: HighP99Latency
        expr: |
          histogram_quantile(
            0.99,
            sum by (service_name, le) (
              rate(http_request_duration_seconds_bucket[5m])
            )
          ) > 3.0
        for: 20s
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High p99 latency on {{ $labels.service_name }}"
          description: >-
            {{ $labels.service_name }} p99 latency is
            {{ $value | humanizeDuration }} over last 5 minutes (threshold 3s).
            Check for slow downstream calls or resource saturation.
          dashboard_url: "http://grafana:3000/d/obs-overview"
          runbook_url: "http://xyops:5522"

      # Warning: p50 (median) latency > 1 second — something broadly wrong
      - alert: HighMedianLatency
        expr: |
          histogram_quantile(
            0.50,
            sum by (service_name, le) (
              rate(http_request_duration_seconds_bucket[5m])
            )
          ) > 1.0
        for: 20s
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Elevated median latency on {{ $labels.service_name }}"
          description: >-
            {{ $labels.service_name }} median (p50) latency is
            {{ $value | humanizeDuration }} — more than half of requests are slow.
          dashboard_url: "http://grafana:3000/d/obs-overview"
          runbook_url: "http://xyops:5522"

  # ────────────────────────────────────────────────────────────
  # Traffic Anomaly Alerts
  # Detect unusual spikes or drops in request rate.
  # ────────────────────────────────────────────────────────────
  - name: traffic
    interval: 15s
    rules:

      # Traffic spike: current rate > 5x the 10-min average
      - alert: TrafficSpike
        expr: |
          (
            sum by (service_name) (rate(http_requests_total[1m]))
            /
            sum by (service_name) (rate(http_requests_total[10m]))
          ) > 5
        for: 30s
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Traffic spike detected on {{ $labels.service_name }}"
          description: >-
            {{ $labels.service_name }} is receiving 5x its normal request rate.
            May indicate a DDoS, runaway client, or load test.
          dashboard_url: "http://grafana:3000/d/obs-overview"
          runbook_url: "http://xyops:5522"

  # ────────────────────────────────────────────────────────────
  # OTel Collector Health
  # Monitor the collector itself — if it drops data, all signals are blind.
  # ────────────────────────────────────────────────────────────
  - name: collector_health
    interval: 15s
    rules:

      - alert: CollectorDroppingData
        expr: |
          rate(otelcol_processor_dropped_spans[5m]) > 0
        for: 1m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "OTel Collector is dropping spans"
          description: >-
            The OpenTelemetry Collector is dropping spans — likely memory pressure.
            Current drop rate: {{ $value | humanize }}/s.
            Check collector memory limits and batch processor settings.
          dashboard_url: "http://grafana:3000"
          runbook_url: "http://xyops:5522"

  # ────────────────────────────────────────────────────────────
  # Storage Alerts  (Ceph OSD / Pool / PVC)
  # Sourced from storage-simulator exposing storage_* metrics.
  # All storage alerts carry  domain: storage  so Alertmanager
  # routes them to storage-agent instead of aiops-bridge.
  # ────────────────────────────────────────────────────────────
  - name: storage_alerts
    interval: 15s
    rules:

      # One OSD offline → cluster WARN, degraded PGs
      - alert: CephOSDDown
        expr: storage_osd_up == 0
        for: 30s
        labels:
          severity: warning
          team: storage
          domain: storage
        annotations:
          summary: "Ceph OSD {{ $labels.osd_id }} is down"
          description: >-
            OSD {{ $labels.osd_id }} has been down for > 30s.
            Cluster has degraded placement groups.
            Run: ceph osd reweight {{ $labels.osd_id }} 0.0  to safely remove it.
          dashboard_url: "http://grafana:3000/d/agentic-ai-overview"
          runbook_url: "http://xyops:5522"

      # Two or more OSDs offline → cluster ERROR, data at risk
      - alert: CephMultipleOSDDown
        expr: count(storage_osd_up == 0) >= 2
        for: 30s
        labels:
          severity: critical
          team: storage
          domain: storage
        annotations:
          summary: "Multiple Ceph OSDs are down ({{ $value }} OSDs)"
          description: >-
            {{ $value }} OSDs are down. Data availability is at risk.
            Immediate human intervention required — do NOT auto-remediate.
          dashboard_url: "http://grafana:3000/d/agentic-ai-overview"
          runbook_url: "http://xyops:5522"

      # Pool approaching capacity — early warning
      - alert: CephPoolNearFull
        expr: |
          (storage_pool_used_bytes / storage_pool_capacity_bytes) > 0.85
        for: 1m
        labels:
          severity: warning
          team: storage
          domain: storage
        annotations:
          summary: "Storage pool {{ $labels.pool }} is near full (> 85%)"
          description: >-
            Pool {{ $labels.pool }} is at {{ $value | humanizePercentage }} capacity.
            Plan data archival or pool expansion before writes fail.
          dashboard_url: "http://grafana:3000/d/agentic-ai-overview"
          runbook_url: "http://xyops:5522"

      # Pool critically full — writes will be throttled / rejected
      - alert: CephPoolFull
        expr: |
          (storage_pool_used_bytes / storage_pool_capacity_bytes) > 0.95
        for: 30s
        labels:
          severity: critical
          team: storage
          domain: storage
        annotations:
          summary: "Storage pool {{ $labels.pool }} is critically full (> 95%)"
          description: >-
            Pool {{ $labels.pool }} is at {{ $value | humanizePercentage }} capacity.
            New writes will fail. Immediate action: archive data or expand pool.
          dashboard_url: "http://grafana:3000/d/agentic-ai-overview"
          runbook_url: "http://xyops:5522"

      # PVC IO latency above threshold — IO pressure affecting workloads
      - alert: PVCHighLatency
        expr: storage_io_latency_seconds > 0.050
        for: 1m
        labels:
          severity: warning
          team: storage
          domain: storage
        annotations:
          summary: "High IO latency on PVC {{ $labels.pvc }}"
          description: >-
            PVC {{ $labels.pvc }} latency is {{ $value | humanizeDuration }}
            (threshold: 50ms). Check for disk saturation or noisy neighbour PVCs.
          dashboard_url: "http://grafana:3000/d/agentic-ai-overview"
          runbook_url: "http://xyops:5522"

      # One PVC consuming extreme IOPS — noisy neighbour
      - alert: NoisyPVCDetected
        expr: storage_pvc_iops > 2000
        for: 1m
        labels:
          severity: warning
          team: storage
          domain: storage
        annotations:
          summary: "Noisy PVC detected: {{ $labels.pvc }} ({{ $labels.operation }})"
          description: >-
            PVC {{ $labels.pvc }} is consuming {{ $value | humanize }} IOPS
            ({{ $labels.operation }}) which may be starving neighbour PVCs.
            Consider applying IO throttle via StorageClass QoS.
          dashboard_url: "http://grafana:3000/d/agentic-ai-overview"
          runbook_url: "http://xyops:5522"

  # ────────────────────────────────────────────────────────────
  # Intelligence Signals (informational — for dashboard only)
  # Based on obs_intelligence_* metrics from obs-intelligence:9100.
  # These fire when the intelligence engine detects high risk WITHOUT
  # a corresponding Prometheus alert — i.e., pre-alert / predictive state.
  # They do NOT route to agents (alertmanager inhibits them when a real
  # alert fires for the same domain).
  # ────────────────────────────────────────────────────────────
  - name: intelligence_signals
    interval: 30s
    rules:

      # Informational: risk score is elevated but no Prometheus alert is firing.
      # The obs-intelligence background loop will have already sent a predictive
      # alert to the domain agent.  This rule makes the signal visible in
      # Prometheus / Alertmanager UI and Grafana for post-incident analysis.
      - alert: NoAlertFiringButHighRisk
        expr: |
          obs_intelligence_risk_score > 0.75
          unless on()
          (count(ALERTS{alertstate="firing"}) > 0)
        for: 5m
        labels:
          severity: info
          team: platform
        annotations:
          summary: "High intelligence risk score with no active alert ({{ $labels.domain }})"
          description: >-
            obs_intelligence_risk_score is above 0.75 for > 5 minutes
            but no Prometheus alert is currently firing for domain={{ $labels.domain }}.
            A predictive alert has been sent to the domain agent.
            Check the xyOps approval queue for a [PREDICTIVE] ticket.
          dashboard_url: "http://grafana:3000/d/agentic-ai-overview"
          runbook_url: "http://xyops:5522"

      # Informational: an anomaly Z-score exceeds 3.0 — statistically unusual
      - alert: HighAnomalyZScore
        expr: |
          abs(obs_intelligence_anomaly_z_score) > 3.0
        for: 3m
        labels:
          severity: info
          team: platform
        annotations:
          summary: "High anomaly Z-score detected ({{ $labels.metric_name }}, domain={{ $labels.domain }})"
          description: >-
            Metric {{ $labels.metric_name }} has a Z-score of {{ $value | humanize }}
            (threshold ±3.0), indicating statistically unusual behaviour in the
            {{ $labels.domain }} domain.
          dashboard_url: "http://grafana:3000/d/agentic-ai-overview"
          runbook_url: "http://xyops:5522"

      # Cluster health degraded (health score < 2 = not OK)
      - alert: CephClusterDegraded
        expr: storage_cluster_health_score < 2
        for: 30s
        labels:
          severity: warning
          team: storage
          domain: storage
        annotations:
          summary: "Ceph cluster health is degraded (score={{ $value }})"
          description: >-
            Cluster health score {{ $value }} (0=ERROR, 1=WARN, 2=OK).
            Degraded PGs: {{ with query "storage_degraded_placement_groups" }}{{ . | first | value | printf "%.0f" }}{{ else }}unknown{{ end }}.
            Investigate OSD status and placement group recovery.
          dashboard_url: "http://grafana:3000/d/agentic-ai-overview"
          runbook_url: "http://xyops:5522"
